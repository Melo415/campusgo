server:
  port: 8081
spring:
  application:
    name: hmdp
  servlet:
    multipart:
      # 单个文件大小限制
      max-file-size: 2MB
      # 单次请求总大小限制
      max-request-size: 10MB
      # 是否延迟解析
      enabled: true
      # 文件大小阈值，超过此阈值将写入临时文件
      file-size-threshold: 0
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://localhost:3306/hmdp?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: XUWENwen050415*
    #username: root
    #password: aaa12345
    #username: hmdp
    #password: pWJMjfNkLxGbn4s8
  redis:
    host: localhost
    port: 6379
    password:
    database: 10
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    #username: admin
    #password: 4d4affaa
    virtual-host: /
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          max-interval: 10000
          multiplier: 1.0

  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段

aliyun:
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    access-key-id: ${ALIBABA_CLOUD_ACCESS_KEY_ID}
    access-key-secret: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET}
    bucket-name: melo-xder-test

mybatis-plus:
  type-aliases-package: com.hmdp.entity # 别名扫描包
logging:
  level:
    com.hmdp: debug


